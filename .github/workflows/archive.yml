name: Archive JS

on:
  push:
    paths:
      - '**.js'

jobs:
  archive:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node robot.js

      - name: Commit archive
        run: |
          git config user.name "archive-bot"
          git config user.email "archive-bot@users.noreply.github.com"
          git add archive/
          git diff --staged --quiet || git commit -m "Auto archive JS"
          git push
