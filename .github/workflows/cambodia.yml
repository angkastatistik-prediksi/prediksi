name: Auto Build Halaman Baru Pasaran SEO

on:
  push:
    paths:
      - 'data/data-*.js' # Robot otomatis jalan jika Anda mengedit file data pasaran apa saja di HP

# MEMBERIKAN IZIN TULIS AGAR ROBOT BISA MEMBUAT HALAMAN DAN DATABASE BARU DI GITHUB
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Menggunakan versi terbaru v4 yang lebih cepat dan stabil

    - name: Setup Node.js
      uses: actions/setup-node@v4 # Menggunakan versi Node terbaru v4
      with:
        node-version: '18'

    - name: Run Generator Induk
      run: node scripts/update-all.js # Menjalankan script satu untuk semua pasaran

    - name: Push HTML dan JSON ke GitHub Pages (Anti-Mogok)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Menyuruh robot memeriksa dan menangkap semua file baru (.html & .json)
        git add .
        
        # Trik jitu: Jika tidak ada perubahan tanggal, robot melompat dengan aman [skip ci] agar tidak putar-putar terus
        git diff --quiet && git diff --staged --quiet || git commit -m "Otomatisasi pembuatan halaman arsip prediksi baru [skip ci]"
        
        # Push hasil cetakan halaman harian baru ke GitHub Pages Anda
        git push origin HEAD
