name: Auto Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node generate-archive.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto update archive
