name: Auto Archive and Deploy All Pages

on:
  push:
    paths:
      - 'data/data-cambodia.js'
      - 'data/data-sdy.js'
      - 'data/data-china.js'
      - 'data/data-japan.js'
      - 'data/data-sgp.js'
      - 'data/data-taiwan.js'
      - 'data/data-hk.js'

jobs:
  archive-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Ditambahkan agar robot bisa membaca riwayat editan sebelumnya dengan aman

      - name: Generate Archive Page
        run: |
          mkdir -p archive
          TIMESTAMP=$(date +'%Y-%m-%d-%H%M%S')
          
          # Robot akan memeriksa file apa saja yang Anda ubah di HP pada commit terakhir
          PERUBAHAN=$(git diff --name-only HEAD^ HEAD)
          
          echo "File yang Anda update di HP: $PERUBAHAN"
          
          if echo "$PERUBAHAN" | grep -q "data/data-cambodia.js"; then
            cp cambodia.html archive/cambodia-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-sdy.js"; then
            cp sdy.html archive/sdy-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-china.js"; then
            cp china.html archive/china-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-japan.js"; then
            cp japan.html archive/japan-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-sgp.js"; then
            cp sgp.html archive/sgp-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-taiwan.js"; then
            cp taiwan.html archive/taiwan-$TIMESTAMP.html
          fi
          if echo "$PERUBAHAN" | grep -q "data/data-hk.js"; then
            cp hk.html archive/hk-$TIMESTAMP.html
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git commit -m "Otomatis: Mengarsipkan pasaran yang diperbarui" || echo "Tidak ada perubahan untuk diarsip"
          git push origin main
