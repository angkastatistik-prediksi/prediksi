name: Auto Archive and Deploy All Pages

on:
  push:
    paths:
      - 'data/data-cambodia.js'
      - 'data/data-sdy.js'
      - 'data/data-china.js'
      - 'data/data-japan.js'
      - 'data/data-sgp.js'
      - 'data/data-taiwan.js'
      - 'data/data-hk.js'

# KUNCI JAWABAN: Memberikan izin resmi kepada robot untuk menulis file baru di repositori
permissions:
  contents: write

jobs:
  archive-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Archive Page
        run: |
          mkdir -p archive
          TIMESTAMP=$(date +'%Y-%m-%d-%H%M%S')
          
          cp cambodia.html archive/cambodia-$TIMESTAMP.html 2>/dev/null || true
          cp sdy.html archive/sdy-$TIMESTAMP.html 2>/dev/null || true
          cp china.html archive/china-$TIMESTAMP.html 2>/dev/null || true
          cp japan.html archive/japan-$TIMESTAMP.html 2>/dev/null || true
          cp sgp.html archive/sgp-$TIMESTAMP.html 2>/dev/null || true
          cp taiwan.html archive/taiwan-$TIMESTAMP.html 2>/dev/null || true
          cp hk.html archive/hk-$TIMESTAMP.html 2>/dev/null || true
          
          echo "Proses penggandaan selesai!"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git commit -m "Otomatis: Menyimpan perubahan prediksi terbaru" || echo "Tidak ada perubahan"
          git push origin main
