name: Auto Archive and Deploy All Pages

on:
  push:
    paths:
      - 'data/data-cambodia.js'
      - 'data/data-sdy.js'
      - 'data/data-china.js'
      - 'data/data-japan.js'
      - 'data/data-sgp.js'
      - 'data/data-taiwan.js'
      - 'data/data-hk.js'

permissions:
  contents: write

jobs:
  archive-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Mengambil data riwayat git secara penuh untuk menghindari tabrakan push
          fetch-depth: 0 

      - name: Generate Archive Page
        run: |
          mkdir -p archive
          TIMESTAMP=$(date +'%Y-%m-%d-%H%M%S')
          
          cp cambodia.html archive/cambodia-$TIMESTAMP.html 2>/dev/null || true
          cp sdy.html archive/sdy-$TIMESTAMP.html 2>/dev/null || true
          cp china.html archive/china-$TIMESTAMP.html 2>/dev/null || true
          cp japan.html archive/japan-$TIMESTAMP.html 2>/dev/null || true
          cp sgp.html archive/sgp-$TIMESTAMP.html 2>/dev/null || true
          cp taiwan.html archive/taiwan-$TIMESTAMP.html 2>/dev/null || true
          cp hk.html archive/hk-$TIMESTAMP.html 2>/dev/null || true
          
          echo "Proses penggandaan selesai!"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          # 1. Daftarkan folder archive ke sistem git
          git add archive/
          
          # 2. Cek apakah ada file baru. Jika tidak ada, hentikan robot dengan aman tanpa memicu X Merah
          if git diff-index --quiet HEAD; then
            echo "Tidak ada perubahan file baru di folder archive. Proses dihentikan dengan aman."
            exit 0
          fi
          
          # 3. Buat catatan perubahan (commit)
          git commit -m "Otomatis: Menyimpan perubahan prediksi terbaru"
          
          # 4. Ambil data terbaru dari server dengan metode rebase (Anti-Tabrakan & Anti-Macet)
          git pull origin main --rebase
          
          # 5. Kirim data kembali ke GitHub main branch
          git push origin main
