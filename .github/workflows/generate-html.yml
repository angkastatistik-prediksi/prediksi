name: Auto Build HTML Statis Pasaran

on:
  push:
    paths:
      - 'data/data-*.js' # Robot berjalan otomatis jika file .js di folder data diedit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run Generator
      run: node generate.js

    - name: Push HTML Baru ke GitHub Pages
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Update otomatis isi angka halaman HTML prediksi"
        git push
