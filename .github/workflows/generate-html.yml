name: Auto Build Halaman Baru Pasaran SEO

on:
  push:
    paths:
      - 'data/data-*.js' # Robot berjalan otomatis jika ada file data yang Anda edit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run Generator
      run: node generate.js

    - name: Push HTML ke GitHub Pages (Anti-Mogok)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        # Trik jitu: Jika tidak ada perubahan angka, robot akan melewatkan commit secara aman tanpa memicu tanda X merah
        git diff --quiet && git diff --staged --quiet || git commit -m "Otomatisasi pembuatan halaman arsip prediksi baru"
        git push origin HEAD
