<!-- 2. TAMPILAN DAFTAR RIWAYAT DENGAN WARNA WARNI SESUAI PERMINTAAN -->
<div style="margin: 20px 0; font-family: sans-serif;">
    <!-- Teks lihat prediksi sebelumnya warna merah -->
    <h3 style="margin: 0 0 10px 0; color: #ff0000; font-size: 16px; font-weight: bold;">🔘 ᴘʀᴇᴅɪᴋsɪ sᴇʙᴇʟᴜᴍɴʏᴀ</h3>

<script>
const USERNAME = "angkastatistik-prediksi"; 
const REPO = "prediksi";

const NAMA_HALAMAN = window.location.pathname.split('/').pop().replace('.html', '') || 'hk';

function formatTanggalIndo(namaFile) {
    const bersih = namaFile.replace(`${NAMA_HALAMAN}-`, '').replace('.html', '');
    const bagian = bersih.split('-');
    
    if (bagian.length >= 4) {
        const tahun = bagian[0];
        const bulan = bagian[1];
        const hari = bagian[2];
        const waktu = bagian[3]; 
        
        const jam = waktu.substring(0, 2);
        const menit = waktu.substring(2, 4);
        
        return `${hari}-${bulan}-${tahun} Jam ${jam}:${menit} WIB`;
    }
    return bersih;
}

async function ambilArsip() {
    const url = `https://github.com{USERNAME}/${REPO}/contents/archive`;
    const listElement = document.getElementById('daftar-arsip');
    
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Belum ada arsip.');
        
        const files = await response.json();
        listElement.innerHTML = ''; 
        
        files.reverse(); 

        let adaArsip = false;
        files.forEach(file => {
            if (file.name.startsWith(`${NAMA_HALAMAN}-`) && file.name.endsWith('.html')) {
                adaArsip = true;
                const li = document.createElement('li');
                const a = document.createElement('a');
                const tanggalRapi = formatTanggalIndo(file.name);
                
                a.href = `https://${USERNAME}.github.io/${REPO}/${file.path}`;
                a.target = "_blank";
                
                a.textContent = `🔘 ᴘʀᴇᴅɪᴋsɪ: ${tanggalRapi}`;
                // Teks prediksi sebelumnya warna kuning
                a.style.color = "#ffcc00"; 
                a.style.textDecoration = "none";
                a.style.fontWeight = "bold";
                
                li.appendChild(a);
                li.style.listStyleType = "none"; 
                li.style.marginBottom = "10px";
                listElement.appendChild(li);
            }
        });

        if (!adaArsip) {
            listElement.innerHTML = '<li style="list-style-type: none; color: #888;">Belum ada riwayat prediksi untuk pasaran ini.</li>';
        }
    } catch (error) {
        listElement.innerHTML = '<li style="list-style-type: none; color: #888;">Belum ada riwayat prediksi yang tersimpan.</li>';
    }
}

ambilArsip();
</script>

    <script>
const DATA_PREDIKSI = DATA_CAMBODIA.data.prediksi;
const TEKS_2D = DATA_CAMBODIA.data.result2d;
const ANGKA_BBFS = DATA_CAMBODIA.data.bbfs;
const ANGKA_COLOK_BEBAS = DATA_CAMBODIA.data.cb;
        
        // =================================================================
        // SISTEM ENGINE OTOMATIS TAB SWITCHER & RENDER BOLA
        // =================================================================
        document.addEventListener('DOMContentLoaded', () => {
            prosesRenderBola(DATA_PREDIKSI, 'area-prediksi');
            
            document.getElementById("area-kesimpulan").innerText = TEKS_2D;

// BBFS (6 bola)
let htmlBBFS = "";
for (let angka of ANGKA_BBFS) {
    htmlBBFS += `<span class="bola bola-merah" style="width:45px;height:45px;font-size:1.4rem;margin:3px;">${angka}</span>`;
}
document.getElementById('area-bbfs').innerHTML = htmlBBFS;

// Colok Bebas (1 bola)
document.getElementById('area-cb').innerHTML =
`<span class="bola bola-merah" style="width:45px;height:45px;font-size:1.4rem;">${ANGKA_COLOK_BEBAS}</span>`;

function prosesRenderBola(data, targetId) {

    if (typeof data === "string") {
        data = data.trim().split(/\r?\n/);
    }

    const penampung = document.getElementById(targetId);
    if (!penampung) return;

    penampung.innerHTML = "";

    data.forEach(baris => {

        const bagian = baris.split(":");
        if (bagian.length !== 2) return;

        const kiri = bagian[0].trim();
        const kanan = bagian[1].trim();

        let htmlBaris = '<div class="baris-angka">';

        for (let c of kiri)
            htmlBaris += `<span class="bola bola-merah">${c}</span>`;

        htmlBaris += '<span class="pembatas-titik-dua">:</span>';

        const dicoret = kanan.startsWith("-");
        const angka = dicoret ? kanan.substring(1) : kanan;

        for (let c of angka)
            htmlBaris += `<span class="bola bola-putih">${dicoret ? `<s>${c}</s>` : c}</span>`;

        htmlBaris += "</div>";

        penampung.innerHTML += htmlBaris;
    });
}
});
</script>
