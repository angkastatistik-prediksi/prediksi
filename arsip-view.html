<script src="data/arsip-hk.js"></script>

<div id="hasil"></div>


<script>

let tgl =
new URLSearchParams(location.search)
.get("tanggal");


let data =
ARSIP_HK.find(
x=>x.tanggal===tgl
);


document.getElementById("hasil").innerHTML=`

<h2>${data.tanggal}</h2>

<pre>
${data.data.prediksi}
</pre>

<p>
2D : ${data.data.result2d}
</p>

<p>
BBFS : ${data.data.bbfs}
</p>

<p>
CB : ${data.data.cb}
</p>

`;

</script>
