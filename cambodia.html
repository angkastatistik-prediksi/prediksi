<!-- KODE ASLI LOGIKA RENDER BOLA ANDA -->
<script src="data/data-cambodia.js"></script>
<script>
const DATA_PREDIKSI = DATA_CAMBODIA.data.prediksi;
const TEKS_2D = DATA_CAMBODIA.data.result2d;
const ANGKA_BBFS = DATA_CAMBODIA.data.bbfs;
const ANGKA_COLOK_BEBAS = DATA_CAMBODIA.data.cb;
        
document.addEventListener('DOMContentLoaded', () => {
    prosesRenderBola(DATA_PREDIKSI, 'area-prediksi');
    document.getElementById("area-kesimpulan").innerText = TEKS_2D;

    let htmlBBFS = "";
    for (let angka of ANGKA_BBFS) {
        htmlBBFS += `<span class="bola bola-merah" style="width:45px;height:45px;font-size:1.4rem;margin:3px;">${angka}</span>`;
    }
    document.getElementById('area-bbfs').innerHTML = htmlBBFS;

    document.getElementById('area-cb').innerHTML = `<span class="bola bola-merah" style="width:45px;height:45px;font-size:1.4rem;">${ANGKA_COLOK_BEBAS}</span>`;

    function prosesRenderBola(data, targetId) {
        if (typeof data === "string") {
            data = data.trim().split(/\r?\n/);
        }
        const penampung = document.getElementById(targetId);
        if (!penampung) return;
        penampung.innerHTML = "";

        data.forEach(baris => {
            const bersih = baris.trim();
            if (!bersih || bersih.startsWith('//') || !bersih.includes(':')) return;

            const bagian = bersih.split(":");
            if (bagian.length !== 2) return;

            const kiri = bagian[0].trim();
            const kanan = bagian[1].trim();

            let htmlBaris = '<div class="baris-angka">';
            for (let c of kiri) htmlBaris += `<span class="bola bola-merah">${c}</span>`;
            htmlBaris += '<span class="pembatas-titik-dua">:</span>';

            const dicoret = kanan.startsWith("-");
            const angka = dicoret ? kanan.substring(1) : kanan;
            for (let c of angka) htmlBaris += `<span class="bola bola-putih">${dicoret ? `<s>${c}</s>` : c}</span>`;
            htmlBaris += "</div>";

            penampung.innerHTML += htmlBaris;
        });
    }
});

document.getElementById("lastUpdate").innerHTML = "𝚃𝚎𝚛𝚊𝚔𝚑𝚒𝚛 𝙳𝚒𝚙𝚎𝚛𝚋𝚊𝚛𝚞𝚒 𝙰𝙳𝙼𝙸𝙽 :<br>" + DATA_CAMBODIA.update;
</script>
