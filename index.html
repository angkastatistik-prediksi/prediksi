<script>
    // KODE KONFIGURASI FIREBASE ANDA (Salin dari Project Settings Firebase Anda)
    const firebaseConfig = {
  apiKey: "AIzaSyCWFVmbhOV53gvlU8XXLQZwDRE-spnD8B4",
  authDomain: "predksi-poo.firebaseapp.com",
  databaseURL: "https://predksi-poo-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "predksi-poo",
  storageBucket: "predksi-poo.firebasestorage.app",
  messagingSenderId: "1098537161657",
  appId: "1:1098537161657:web:979a6f4b46e1b36e815c68"
};

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Membuat ID unik otomatis berdasarkan URL halaman aktif
    const pathName = window.location.pathname === "/" ? "home" : window.location.pathname;
    const pageId = pathName.replace(/[\.\#\$\[\]\/]/g, "_");

    const likeRef = database.ref('likes/' + pageId);
    const likeButton = document.getElementById('likeButton');
    const likeCountLabel = document.getElementById('likeCount');

    // Cek status lokal (apakah browser pengunjung ini sudah pernah klik suka)
    let hasLiked = localStorage.getItem('liked_' + pageId) === 'true';
    if (hasLiked) {
        setLikedStyle();
    }

    // Ambil data jumlah suka secara Realtime untuk semua pengunjung
    likeRef.on('value', (snapshot) => {
        likeCountLabel.textContent = snapshot.val() || 0;
    });

    // Logika ketika tombol klik suka ditekan
    likeButton.addEventListener('click', () => {
        if (!hasLiked) {
            likeRef.transaction(c => (c || 0) + 1);
            hasLiked = true;
            localStorage.setItem('liked_' + pageId, 'true');
            setLikedStyle();
        } else {
            likeRef.transaction(c => (c || 0) - 1);
            hasLiked = false;
            localStorage.removeItem('liked_' + pageId);
            setNormalStyle();
        }
    });

function setLikedStyle() {
    likeButton.style.backgroundColor = '#e0245e';
    likeButton.style.color = '#fff';
    likeButton.style.borderColor = '#e0245e';
}
function setNormalStyle() {
    likeButton.style.backgroundColor = '#fff';
    likeButton.style.color = '#333';
    likeButton.style.borderColor = '#ccc';
    }
