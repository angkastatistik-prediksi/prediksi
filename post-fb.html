<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Angka Statistik</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>


<style>

.generator-box{

background:#18182f;

border:2px solid #00d9ff;

border-radius:15px;

padding:20px;

margin:20px auto;

max-width:600px;

}


.title{

color:#00e5ff;

font-size:35px;

font-weight:bold;

text-align:center;

text-shadow:0 0 15px cyan;

}


.ball-red{

width:45px;

height:45px;

border-radius:50%;

background:linear-gradient(#ff4d7d,#b50034);

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

font-weight:bold;

color:white;

}


.ball-white{

width:45px;

height:45px;

border-radius:50%;

background:white;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

font-weight:bold;

color:#111;

}


.rowhasil{

display:flex;

justify-content:center;

gap:8px;

margin:15px;

}

</style>


</head>


<body>


<header>

<h1 class="judul-web">

𝐀𝐍𝐆𝐊𝐀 𝐒𝐓𝐀𝐓𝐈𝐒𝐓𝐈𝐊

</h1>


</header>



<div class="generator-box">


<select id="pasaran" class="form-select">

<option>Cambodia Pools</option>

<option>Sydney Pools</option>

<option>China Pools</option>

<option>Japan Pools</option>

<option>SGP Pools</option>

<option>Taiwan Pools</option>

<option>Hongkong Pools</option>

</select>



<br>


<textarea id="data" 
class="form-control"
rows="10"
placeholder="1970 89
1194 81
6689 06"></textarea>



<button 
class="btn btn-success w-100 mt-3"
onclick="proses()">

PROSES DATA

</button>


<br><br>


<div id="capture">


<div class="title" id="judul">

Cambodia Pools

</div>


<hr>


<div id="hasil"></div>


</div>


<button 
class="btn btn-primary"
onclick="download()">

DOWNLOAD GAMBAR

</button>


<button 
class="btn btn-danger"
onclick="hapus()">

HAPUS

</button>


<br><br>


<a href="index.html" class="btn btn-secondary w-100">

KEMBALI MENU UTAMA

</a>



</div>



<script>

function proses(){

    document.getElementById("judul").innerText =
    document.getElementById("pasaran").value;


    let text=document.getElementById("data").value.trim();


    if(text==""){
        document.getElementById("hasil").innerHTML="";
        return;
    }


    let baris=text.split("\n");

    let hasil="";


    baris.forEach(function(item){

        item=item.trim();

        if(item=="") return;


        let bagian=item.split(/\s+/);


        if(bagian.length<2) return;


        let angka4d=bagian[0].trim();

        let putih=bagian[1].trim();


        hasil+='<div class="rowhasil">';


        for(let i=0;i<4;i++){

            hasil+='<div class="ball-red">'+(angka4d[i] || "")+'</div>';

        }


        hasil+='<div style="width:20px"></div>';



        if(putih.startsWith("-")){

            let p=putih.substring(1);


            hasil += 
            '<div class="ball-white"><span style="text-decoration:line-through;">'+(p[0] || "")+'</span></div>';

            hasil += 
            '<div class="ball-white"><span style="text-decoration:line-through;">'+(p[1] || "")+'</span></div>';


        }else{


            hasil += 
            '<div class="ball-white">'+(putih[0] || "")+'</div>';

            hasil += 
            '<div class="ball-white">'+(putih[1] || "")+'</div>';


        }


        hasil+='</div>';


    });


    document.getElementById("hasil").innerHTML=hasil;


    updateWaktu();

}




function updateWaktu(){

    const now = new Date();


    const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];


    const bulan = [
        "Januari",
        "Februari",
        "Maret",
        "April",
        "Mei",
        "Juni",
        "Juli",
        "Agustus",
        "September",
        "Oktober",
        "November",
        "Desember"
    ];



    const tanggal =
    hari[now.getDay()] + ", " +
    now.getDate() + " " +
    bulan[now.getMonth()] + " " +
    now.getFullYear();



    const jam =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");



    document.getElementById("waktu").innerHTML =
    tanggal + "<br>" + jam + " WIB";

}




function download(){

    updateWaktu();


    setTimeout(function(){


        html2canvas(document.querySelector("#capture"))
        .then(canvas=>{


            let link=document.createElement("a");


            link.download="angkastatistik.png";


            link.href=canvas.toDataURL();


            link.click();


        });


    },200);


}




function hapus(){

    document.getElementById("data").value="";

    document.getElementById("hasil").innerHTML="";

    document.getElementById("waktu").innerHTML="";

}

</script>



</body>
</html>
