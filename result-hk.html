<script src="data/data-result-hk.js"></script>

<script>

const DATA_HK = RESULT_HK.data.trim().split("\n");

const hari=[
"SENIN",
"SELASA",
"RABU",
"KAMIS",
"JUMAT",
"SABTU",
"MINGGU"
];

document.getElementById("lastUpdate").innerHTML=
"<b>TERAKHIR DIPERBARUI :</b><br>"+RESULT_HK.update;

let html="";

DATA_HK.forEach(function(baris){

    const minggu = baris.trim().split(/\s+/);

    html+='<div class="minggu">';

    hari.forEach(function(h){
        html+='<div class="hari">'+h+'</div>';
    });

    minggu.forEach(function(hasil){

        html+='<div class="hasil">';

        hasil = hasil.toString().trim();

if (hasil === "" || hasil === "-") {
    hasil = "XXXX";
    }

        for(let i=0;i<hasil.length;i++){

            html+='<span class="bola-kecil">'+hasil[i]+'</span>';

        }

        html+='</div>';

    });

    html+='</div>';

});

document.getElementById("data-hasil").innerHTML=html;

</script>
