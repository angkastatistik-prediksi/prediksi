<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Result Sydney 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#edf4ff;
}

.header{
    background:linear-gradient(135deg,#0d6efd,#0047b3);

    padding:25px;

.header h1{

.header p{

}

.container{
    width:95%;
    max-width:1100px;
    margin:25px auto;
}

.menu{
    display:inline-block;
    text-decoration:none;
    background:#0d6efd;
    color:#fff;
    padding:12px 22px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:20px;
    transition:.3s;
}

.menu:hover{
    background:#0047b3;
}

.table-box{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0d6efd;
    color:#fff;
}

th,td{
    padding:13px;
    text-align:center;
    border:1px solid #d7e3ff;
}

tbody tr:nth-child(even){
    background:#f4f8ff;
}

tbody tr:hover{
    background:#dcebff;
}

/*==========================
INPUT WARNA AS KOP KEPALA EKOR
===========================*/

.filter-box{
    background:#fff;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.filter-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:12px;
    color:#0d6efd;
}

.filter-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.filter-item{
    text-align:center;
}

.filter-item label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    font-size:13px;
}

.filter-item input{
    width:100%;
    height:42px;
    border-radius:8px;
    border:2px solid #d8d8d8;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    outline:none;
}

#as{
    border-color:#18a34a;
}

#kop{
    border-color:#1976d2;
}

#kepala{
    border-color:#ff9800;
}

#ekor{
    border-color:#f44336;
}

@media(max-width:600px){

.filter-grid{
    grid-template-columns:repeat(4,1fr);
    gap:5px;
}

.filter-item input{
    font-size:18px;
    height:38px;
}

}

.footer{
    margin:25px 0;
    text-align:center;
    color:#666;
}

.table-box{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.table-responsive{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}

.as{
    background:#16a34a;
    color:#fff;
    font-weight:bold;
}

.kop{
    background:#3b82f6;
    color:#fff;
    font-weight:bold;
}

.kepala{
    background:#f59e0b;
    color:#fff;
    font-weight:bold;
}

.ekor{
    background:#ef4444;
    color:#fff;
    font-weight:bold;
}

@media (max-width:600px){

h1{
    font-size:22px;
}

th,td{
    font-size:11px;
    padding:5px 1px;
}

}

/*==========================
ANGKA 4D
===========================*/

.angka4d{
    text-align:center;
    white-space:nowrap;
}

.hasil4d{
    display:inline-flex;
    justify-content:center;
    gap:0;
    padding:2px;
    border:2px solid black;
    border-radius:6px;
    background:#fff;
}

.digit{
    display:flex;
    justify-content:center;
    align-items:center;

    width:22px;
    height:28px;

    border-radius:4px;
    border:none;

    font-size:15px;
    font-weight:bold;

    flex-shrink:0;
    }

.hasil4d .digit{
    border-right:none;
}

.hasil4d .digit:last-child{
    border-right:none;
}
/*==========================
WARNA DIGIT
===========================*/

.warna-as{
    background:#28a745;
    border-color:#28a745;
    color:#fff;
}

.warna-kop{
    background:#0d6efd;
    border-color:#0d6efd;
    color:#fff;
}

.warna-kepala{
    background:#ff9800;
    border-color:#ff9800;
    color:#fff;
}

.warna-ekor{
    background:#dc3545;
    border-color:#dc3545;
    color:#fff;
    }

.hasil4d{

    display:inline-flex;
    padding:2px;
    border-radius:6px;
    transition:.25s;

}

.hasil-cocok{

    background:#dff7df;

}

.hasil4d{

    display:inline-flex;
    padding:2px 3px;
    border-radius:6px;
    transition:.25s;

}

.hasil-cocok{

    background:white;
    box-shadow:0 0 0 1px pink;

}

#resetFilter{

    margin-top:10px;

    padding:10px 18px;

    background:#dc3545;

    color:#fff;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

}

#resetFilter:hover{

    background:#bb2d3b;

}

/* ==========================
   TABLET
========================== */
/* ==========================
   TABLE RESPONSIVE SEMUA PERANGKAT
========================== */

.container{
    width:100%;
    max-width:100%;
    margin:8px auto;
    padding:0 4px;
}

.table-box{
    border-radius:8px;
    overflow:hidden;
}

.table-responsive{
    width:100%;
    overflow-x:hidden;
}

table{
    width:100%;
    table-layout:fixed;
    border-collapse:collapse;
}

th,
td{
    padding:2px;
    font-size:10px;
    text-align:center;
    min-width:auto;
}

th{
    height:28px;
    font-size:10px;
}

/* 4D */
.angka4d{
    white-space:nowrap;
}

.hasil4d{
    display:flex;
    justify-content:center;
    gap:1px;
    padding:1px;
}

.digit{

    height:20px;
    font-size:10px;

    border:1px solid #ddd;
    font-weight:bold;
}

/* HP kecil */
@media (max-width:480px){

    th,
    td{
        padding:1px;
        font-size:9px;
    }

    .digit{
        width:13px;
        height:18px;
        font-size:9px;
    }

}

/* Tablet */
@media (min-width:481px) and (max-width:768px){

    .digit{
        width:15px;
        height:20px;
        font-size:10px;
    }

}

/* Desktop */
@media (min-width:769px){

    .digit{
        width:18px;
        height:24px;

    }

}

#downloadGambar{
    margin-top:10px;
    margin-left:8px;
    padding:10px 18px;
    background:#16a34a;
    color:#fff;
    border:none;
    border-radius:8px;

    font-weight:bold;

</style>

</head>
<body>

<div class="header">
    <h1>RESULT SYDNEY 2026</h1>
    <p id="update"></p>
</div>

<div class="container">

<a href="/index.html" class="menu">⬅ Kembali ke Menu Utama</a>

<div class="filter-box">

<div class="filter-title">
Filter Warna Angka
</div>

<div class="filter-grid">

<div class="filter-item">
<label>AS</label>
<input
type="text"
id="as"
pattern="[0-9]*"
maxlength="1"
inputmode="numeric">
</div>

<div class="filter-item">
<label>KOP</label>
<input
type="text"
id="kop"
pattern="[0-9]*"
maxlength="1"
inputmode="numeric">
</div>

<div class="filter-item">
<label>KEPALA</label>
<input
type="text"
id="kepala"
pattern="[0-9]*"
maxlength="1"
inputmode="numeric">
</div>

<div class="filter-item">
<label>EKOR</label>
<input
type="text"
id="ekor"
pattern="[0-9]*"
maxlength="1"
inputmode="numeric">
</div>

</div>

</div>
<div style="margin-top:12px;text-align:center">

<button id="resetFilter">

Reset Filter

</button>
</div>

<button id="downloadGambar">
    📷 Download Gambar
</button>

<div id="infoHasil" style="margin:12px 0;font-weight:bold;color:#0d6efd">
Total Cocok : 0
</div>
<div class="table-box">
<div class="table-responsive">

<table>

<thead>
<tr>
<th>SEN</th>
<th>SEL</th>
<th>RAB</th>
<th>KAM</th>
<th>JUM</th>
<th>SAB</th>
<th>MNG</th>
</tr>
</thead>

<tbody id="hasil"></tbody>

</table>
</div>

<div class="footer">
AngkaStatistik.my.id
</div>

</div>

<script src="result-togel/sdy.js"></script>

<script>
document.getElementById("update").textContent =
"Update Terakhir : " + RESULT_SDY.update;

const tbody=document.getElementById("hasil");

//=============================
// Render Angka 4D
//=============================

function renderAngka(angka){

    if(angka=="-"){
        return "-";
    }

    angka=angka.padStart(4,"0");

    return `
    <div class="hasil4d" data-angka="${angka}">
        <span class="digit as-digit">${angka[0]}</span>
        <span class="digit kop-digit">${angka[1]}</span>
        <span class="digit kepala-digit">${angka[2]}</span>
        <span class="digit ekor-digit">${angka[3]}</span>
    </div>
    `;

    }

function renderTable(){

    tbody.innerHTML="";

    RESULT_SDY.data.trim().split("\n").forEach(row=>{

        const col=row.trim().split(/\s+/);

        tbody.innerHTML+=`
        <tr>

        ${col.map(v=>`
        <td class="angka4d">
            ${renderAngka(v)}
        </td>
        `).join("")}

        </tr>`;

    });

}

renderTable();
updateWarna();

//=============================
// WARNA OTOMATIS
//=============================

function updateWarna(){

    const asInput=document.getElementById("as").value;
    const kopInput=document.getElementById("kop").value;
    const kepalaInput=document.getElementById("kepala").value;
    const ekorInput=document.getElementById("ekor").value;

    document.querySelectorAll(".hasil4d").forEach(box=>{

        const angka=box.dataset.angka;

        const span=box.querySelectorAll("span");

        span.forEach(s=>{

            s.classList.remove(
                "warna-as",
                "warna-kop",
                "warna-kepala",
                "warna-ekor"
            );

        });

        if(asInput.includes(angka[0]))
            span[0].classList.add("warna-as");

        if(kopInput.includes(angka[1]))
            span[1].classList.add("warna-kop");

        if(kepalaInput.includes(angka[2]))
            span[2].classList.add("warna-kepala");

        if(ekorInput.includes(angka[3]))
            span[3].classList.add("warna-ekor");

        const cocok=
            (asInput==""||asInput.includes(angka[0])) &&
            (kopInput==""||kopInput.includes(angka[1])) &&
            (kepalaInput==""||kepalaInput.includes(angka[2])) &&
            (ekorInput==""||ekorInput.includes(angka[3]));

        box.classList.toggle("hasil-cocok",cocok);

    });

    }

//=============================
// EVENT INPUT
//=============================

["as","kop","kepala","ekor"].forEach(id=>{

    document.getElementById(id).addEventListener("input",updateWarna);

});

["as","kop","kepala","ekor"].forEach(id=>{

    document.getElementById(id).addEventListener("input",function(){

        this.value=this.value.replace(/[^0-9]/g,"");

    });

});

document
.getElementById("resetFilter")
.onclick=function(){

    as.value="";
    kop.value="";
    kepala.value="";
    ekor.value="";

    updateWarna();

}

document.getElementById("downloadGambar").onclick=function(){

    html2canvas(document.querySelector(".table-box"),{
        backgroundColor:"#ffffff",
        scale:3
    }).then(function(canvas){

        const link=document.createElement("a");
        link.download="Result-Sydney.png";
        link.href=canvas.toDataURL("image/png");
        link.click();

    });

};
</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
